<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doodle Spin — Drawing theme randomizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Nunito', sans-serif; background: var(--pageBg); transition: background 0.25s ease; }
  a { color: oklch(0.55 0.18 25); text-decoration: none; }
  a:hover { color: oklch(0.48 0.18 25); }

  @keyframes float1 { 0%,100% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(10px,-18px) rotate(8deg); } }
  @keyframes float2 { 0%,100% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(-14px,14px) rotate(-10deg); } }
  @keyframes float3 { 0%,100% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(8px,12px) rotate(6deg); } }

  @keyframes float1Calm { 0%,100% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(4px,-6px) rotate(2deg); } }
  @keyframes float2Calm { 0%,100% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(-5px,5px) rotate(-3deg); } }
  @keyframes float3Calm { 0%,100% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(3px,4px) rotate(2deg); } }

  @keyframes float1Wild { 0%,100% { transform: translate(0,0) rotate(0deg) scale(1); } 50% { transform: translate(22px,-32px) rotate(20deg) scale(1.08); } }
  @keyframes float2Wild { 0%,100% { transform: translate(0,0) rotate(0deg) scale(1); } 50% { transform: translate(-28px,26px) rotate(-24deg) scale(1.1); } }
  @keyframes float3Wild { 0%,100% { transform: translate(0,0) rotate(0deg) scale(1); } 50% { transform: translate(18px,22px) rotate(16deg) scale(1.06); } }

  @keyframes popIn { 0% { opacity:0; transform: scale(0.85) rotate(-2deg) translateY(10px); } 100% { opacity:1; transform: scale(1) rotate(-1deg) translateY(0); } }
  @keyframes sparkleTwinkle { 0%,100% { opacity:0.3; transform: scale(0.8) rotate(0deg); } 50% { opacity:1; transform: scale(1.15) rotate(25deg); } }

  .page {
    position: relative; min-height: 100vh; width: 100%; overflow: hidden;
    display: flex; flex-direction: column; align-items: center;
    background: var(--pageBg); transition: background 0.25s ease;
  }
  .shape { position: absolute; }

  header { position: relative; z-index: 2; width: 100%; max-width: 1100px;
    display: flex; align-items: center; justify-content: space-between; padding: 32px 32px 0; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark { width: 36px; height: 36px; border-radius: 11px; background: var(--logoBg);
    display: flex; align-items: center; justify-content: center; transform: rotate(-6deg);
    box-shadow: 0 4px 10px oklch(0.4 0.1 40 / 0.3); }
  .logo-dot { width: 14px; height: 14px; border-radius: 50%; background: oklch(0.98 0.02 90); }
  .logo-name { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 20px; color: var(--headingColor); }

  .header-actions { display: flex; align-items: center; gap: 12px; }
  .toggle { display: flex; align-items: center; gap: 8px; border: none; cursor: pointer;
    background: var(--toggleTrackBg); padding: 8px 14px 8px 8px; border-radius: 999px;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px; color: var(--toggleTextColor);
    transition: background 0.25s ease; }
  .toggle .thumb { width: 28px; height: 28px; border-radius: 50%; background: var(--toggleThumbBg);
    display: flex; align-items: center; justify-content: center; font-size: 14px; transition: background 0.25s ease; }

  main { position: relative; z-index: 2; flex: 1; width: 100%; max-width: 720px;
    display: flex; flex-direction: column; align-items: center; text-align: center; padding: 56px 24px 80px; }

  .badge { display: inline-flex; align-items: center; gap: 8px; background: var(--badgeBg); color: var(--badgeText);
    font-weight: 700; font-size: 13px; padding: 8px 16px; border-radius: 999px; margin-bottom: 28px; }

  h1 { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 56px; line-height: 1.08;
    color: var(--headingColor); margin: 0 0 18px; text-wrap: pretty; }
  .lede { font-size: 19px; line-height: 1.55; color: var(--bodyColor); max-width: 480px; margin: 0 0 44px; }

  .mode-toggle { display: inline-flex; padding: 5px; gap: 4px; margin-bottom: 24px;
    background: var(--toggleTrackBg); border-radius: 999px; transition: background 0.25s ease; }
  .mode-opt { border: none; cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px;
    color: var(--toggleTextColor); background: transparent; padding: 9px 22px; border-radius: 999px;
    transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease; }
  .mode-opt.active { background: var(--cardBg); color: var(--cardLabel); box-shadow: 0 2px 8px oklch(0.4 0.05 40 / 0.15); }

  .randomize { font-family: 'Fredoka', sans-serif; position: relative; border: none; cursor: pointer;
    font-weight: 700; font-size: 22px; color: oklch(0.99 0.01 90);
    background: linear-gradient(135deg, var(--btnFrom), var(--btnTo));
    padding: 22px 52px; border-radius: 999px;
    box-shadow: 0 14px 30px var(--btnShadow), inset 0 -4px 0 oklch(0.4 0.1 30 / 0.4);
    transition: transform 0.15s ease; }
  .randomize:hover { transform: scale(1.04); }
  .randomize:active { transform: scale(0.97); }
  .randomize span { display: inline-flex; align-items: center; gap: 10px; }

  .theme-card { margin-top: 36px; background: var(--cardBg); border: 2px solid var(--cardBorder);
    border-radius: 24px; padding: 30px 34px; max-width: 460px; width: 100%;
    box-shadow: 0 10px 26px oklch(0.4 0.05 40 / 0.12); animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1); }
  .theme-card .label { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--cardLabel); margin-bottom: 10px; }
  .theme-card .value { font-family: 'Fredoka', sans-serif; font-size: 26px; font-weight: 600; color: var(--cardText); line-height: 1.3; }

  footer { position: relative; z-index: 2; width: 100%; text-align: center; padding: 0 24px 32px;
    font-size: 13px; color: var(--footerColor); display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .gh-link { display: inline-flex; align-items: center; gap: 7px; color: var(--footerColor); font-weight: 700;
    padding: 6px 14px; border-radius: 999px; background: var(--toggleTrackBg); transition: color 0.2s ease, background 0.2s ease; }
  .gh-link:hover { color: var(--cardLabel); }

  @media (max-width: 640px) { h1 { font-size: 40px; } main { padding-top: 36px; } #shapes { display: none; } }
</style>
</head>
<body>
<div class="page" id="page">
  <div id="shapes"></div>

  <header>
    <div class="logo">
      <div class="logo-mark"><div class="logo-dot"></div></div>
      <span class="logo-name">Doodle Spin</span>
    </div>
    <div class="header-actions">
      <button class="toggle" id="darkToggle" aria-label="Toggle dark mode">
        <span class="thumb" id="toggleThumb">☀️</span>
        <span id="toggleLabel">Light</span>
      </button>
    </div>
  </header>

  <main>
    <div class="badge">🎨 A new theme in one tap</div>
    <h1>Never stare at a blank page again</h1>
    <p class="lede">Doodle Spin generates random drawing themes for doodles, sketchbooks, digital art, illustration practice and daily drawing challenges.</p>

    <div class="mode-toggle" role="tablist" aria-label="Generation mode">
      <button class="mode-opt active" id="modeCategories" data-mode="categories" role="tab" aria-selected="true">Categories</button>
      <button class="mode-opt" id="modeCreative" data-mode="creative" role="tab" aria-selected="false">Creative</button>
    </div>

    <button class="randomize" id="randomize"><span>🎲 Randomize my theme</span></button>

    <div id="themeSlot"></div>
  </main>

  <footer>
    <div>Made for artists who'd rather draw than decide.</div>
    <a class="gh-link" href="https://github.com/ritag189/DoodleSpin" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>
      View on GitHub
    </a>
  </footer>
</div>

<script src="themes.js"></script>
<script>
const clean = arr => (Array.isArray(arr) && arr.length) ? arr : ["Underwater worlds"];
const THEME_LISTS = {
  categories: clean(window.DOODLE_CATEGORIES),
  creative:   clean(window.DOODLE_CREATIVE),
};

const PALETTES = {
  "Sunset Punch": {
    blobA:'oklch(0.86 0.12 85)', blobB:'oklch(0.82 0.13 25)', blobC:'oklch(0.84 0.14 340)', blobD:'oklch(0.88 0.11 145)',
    badgeBg:'oklch(0.94 0.06 60)', badgeText:'oklch(0.45 0.13 40)',
    btnFrom:'oklch(0.68 0.19 40)', btnTo:'oklch(0.62 0.2 15)', btnShadow:'oklch(0.6 0.2 20 / 0.4)',
    cardBorder:'oklch(0.9 0.05 60)', cardLabel:'oklch(0.6 0.15 340)', logoBg:'oklch(0.62 0.19 40)',
  },
  "Bubblegum Pop": {
    blobA:'oklch(0.86 0.13 340)', blobB:'oklch(0.82 0.14 300)', blobC:'oklch(0.85 0.13 200)', blobD:'oklch(0.88 0.1 90)',
    badgeBg:'oklch(0.93 0.07 330)', badgeText:'oklch(0.45 0.16 330)',
    btnFrom:'oklch(0.66 0.2 330)', btnTo:'oklch(0.58 0.2 290)', btnShadow:'oklch(0.55 0.2 300 / 0.4)',
    cardBorder:'oklch(0.9 0.06 330)', cardLabel:'oklch(0.58 0.17 290)', logoBg:'oklch(0.6 0.2 330)',
  },
  "Citrus Splash": {
    blobA:'oklch(0.88 0.14 100)', blobB:'oklch(0.84 0.15 55)', blobC:'oklch(0.86 0.14 140)', blobD:'oklch(0.9 0.1 200)',
    badgeBg:'oklch(0.94 0.08 100)', badgeText:'oklch(0.42 0.13 90)',
    btnFrom:'oklch(0.75 0.18 95)', btnTo:'oklch(0.65 0.19 45)', btnShadow:'oklch(0.6 0.19 60 / 0.4)',
    cardBorder:'oklch(0.9 0.07 100)', cardLabel:'oklch(0.55 0.15 140)', logoBg:'oklch(0.68 0.18 90)',
  },
};

const APPEARANCE = {
  "Light": { pageBg:'oklch(0.98 0.015 85)', headingColor:'oklch(0.28 0.05 40)', bodyColor:'oklch(0.45 0.03 40)',
    footerColor:'oklch(0.55 0.03 40 / 0.7)', cardBg:'oklch(0.99 0.01 90)', cardText:'oklch(0.3 0.05 40)' },
  "Dark": { pageBg:'oklch(0.2 0.02 40)', headingColor:'oklch(0.96 0.01 90)', bodyColor:'oklch(0.8 0.02 60)',
    footerColor:'oklch(0.72 0.02 60 / 0.6)', cardBg:'oklch(0.27 0.025 40)', cardText:'oklch(0.95 0.01 90)' },
};

const ENERGY = {
  "Calm":    { dur1:16, dur2:18, dur3:15, anim1:'float1Calm', anim2:'float2Calm', anim3:'float3Calm', sparkle:false },
  "Playful": { dur1:9,  dur2:11, dur3:7,  anim1:'float1',     anim2:'float2',     anim3:'float3',     sparkle:false },
  "Wild":    { dur1:4,  dur2:5,  dur3:3.5,anim1:'float1Wild', anim2:'float2Wild', anim3:'float3Wild', sparkle:true },
};

const CONFETTI_BASE = [
  { top:'8%', left:'10%', size:22, radius:'6px', rotate:12, colorKey:'A', delay:0 },
  { top:'14%', left:'82%', size:16, radius:'50%', rotate:0, colorKey:'B', delay:0.3 },
  { top:'30%', left:'4%', size:14, radius:'50%', rotate:0, colorKey:'C', delay:0.6 },
  { top:'4%', left:'48%', size:18, radius:'5px', rotate:-20, colorKey:'D', delay:0.9 },
  { top:'46%', left:'90%', size:20, radius:'6px', rotate:30, colorKey:'A', delay:0.2 },
  { top:'60%', left:'6%', size:26, radius:'50%', rotate:0, colorKey:'B', delay:0.5 },
  { top:'70%', left:'76%', size:15, radius:'4px', rotate:15, colorKey:'C', delay:0.8 },
  { top:'82%', left:'30%', size:20, radius:'50%', rotate:0, colorKey:'D', delay:1.1 },
  { top:'86%', left:'58%', size:16, radius:'5px', rotate:-10, colorKey:'A', delay:0.4 },
  { top:'20%', left:'64%', size:12, radius:'50%', rotate:0, colorKey:'B', delay:0.7 },
  { top:'54%', left:'46%', size:14, radius:'4px', rotate:45, colorKey:'C', delay:1.0 },
  { top:'92%', left:'10%', size:18, radius:'50%', rotate:0, colorKey:'D', delay:0.15 },
  { top:'38%', left:'22%', size:15, radius:'6px', rotate:20, colorKey:'A', delay:0.65 },
  { top:'6%', left:'30%', size:13, radius:'50%', rotate:0, colorKey:'B', delay:0.95 },
];

const state = {
  palette: 'Sunset Punch', energy: 'Calm', shapeStyle: 'Scribble',
  dark: false, currentTheme: null, mode: 'categories',
};

const $ = id => document.getElementById(id);

function setVar(name, val) { $('page').style.setProperty(name, val); }

function applyTheme() {
  const pal = PALETTES[state.palette], app = APPEARANCE[state.dark ? 'Dark' : 'Light'], en = ENERGY[state.energy];
  const vars = { ...pal, ...app };
  for (const k in vars) setVar('--' + k, vars[k]);

  setVar('--toggleTrackBg', state.dark ? 'oklch(0.32 0.02 40)' : 'oklch(0.94 0.02 60)');
  setVar('--toggleTextColor', state.dark ? 'oklch(0.9 0.01 90)' : 'oklch(0.4 0.03 40)');
  setVar('--toggleThumbBg', state.dark ? 'oklch(0.5 0.02 40)' : 'oklch(0.99 0.01 90)');
  $('toggleThumb').textContent = state.dark ? '🌙' : '☀️';
  $('toggleLabel').textContent = state.dark ? 'Dark' : 'Light';

  renderShapes(pal, en);
}

function renderShapes(pal, en) {
  const box = $('shapes');
  box.innerHTML = '';
  const mk = css => { const d = document.createElement('div'); d.className = 'shape'; d.style.cssText = css; box.appendChild(d); };

  if (state.shapeStyle === 'Blobs') {
    mk(`top:-60px;left:-60px;width:220px;height:220px;border-radius:50%;background:${pal.blobA};opacity:0.55;animation:${en.anim1} ${en.dur1}s ease-in-out infinite;`);
    mk(`bottom:-80px;right:-70px;width:280px;height:280px;border-radius:50%;background:${pal.blobB};opacity:0.5;animation:${en.anim2} ${en.dur2}s ease-in-out infinite;`);
    mk(`top:120px;right:8%;width:70px;height:70px;border-radius:20px;background:${pal.blobC};opacity:0.6;transform:rotate(12deg);animation:${en.anim3} ${en.dur3}s ease-in-out infinite;`);
    mk(`bottom:18%;left:6%;width:50px;height:50px;border-radius:14px;background:${pal.blobD};opacity:0.55;transform:rotate(-10deg);animation:${en.anim1} ${en.dur2}s ease-in-out infinite;`);
  } else if (state.shapeStyle === 'Confetti') {
    CONFETTI_BASE.forEach((c, i) => {
      const anim = [en.anim1, en.anim2, en.anim3][i % 3], dur = [en.dur1, en.dur2, en.dur3][i % 3];
      mk(`top:${c.top};left:${c.left};width:${c.size}px;height:${c.size}px;border-radius:${c.radius};background:${pal['blob'+c.colorKey]};opacity:0.65;transform:rotate(${c.rotate}deg);animation:${anim} ${dur}s ease-in-out infinite;animation-delay:${c.delay}s;`);
    });
  } else if (state.shapeStyle === 'Scribble') {
    mk(`top:6%;left:-4%;width:280px;height:22px;border-radius:999px;background:${pal.blobA};opacity:0.5;transform:rotate(-18deg);animation:${en.anim1} ${en.dur1}s ease-in-out infinite;`);
    mk(`bottom:10%;right:-6%;width:320px;height:26px;border-radius:999px;background:${pal.blobB};opacity:0.45;transform:rotate(14deg);animation:${en.anim2} ${en.dur2}s ease-in-out infinite;`);
    mk(`top:38%;right:10%;width:160px;height:18px;border-radius:999px;background:${pal.blobC};opacity:0.5;transform:rotate(70deg);animation:${en.anim3} ${en.dur3}s ease-in-out infinite;`);
    mk(`bottom:32%;left:4%;width:140px;height:16px;border-radius:999px;background:${pal.blobD};opacity:0.5;transform:rotate(-60deg);animation:${en.anim1} ${en.dur3}s ease-in-out infinite;`);
  }

  if (en.sparkle) {
    const s = [['16%','14%',null,'26px','2.2s','0s'],['64%',null,'12%','20px','2.6s','0.4s'],['30%',null,'20%','16px','1.8s','0.8s']];
    s.forEach(([top,left,right,size,dur,delay]) => {
      const d = document.createElement('div'); d.className = 'shape'; d.textContent = '✦';
      d.style.cssText = `top:${top};${left?`left:${left};`:''}${right?`right:${right};`:''}font-size:${size};animation:sparkleTwinkle ${dur} ease-in-out infinite ${delay};`;
      box.appendChild(d);
    });
  }
}

function renderTheme() {
  const slot = $('themeSlot');
  if (!state.currentTheme) { slot.innerHTML = ''; return; }
  slot.innerHTML = `<div class="theme-card" key="${Date.now()}">
    <div class="label">Your theme</div>
    <div class="value">${escapeHtml(state.currentTheme)}</div>
  </div>`;
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function randomize() {
  const list = THEME_LISTS[state.mode];
  let next = state.currentTheme;
  if (list.length > 1) { while (next === state.currentTheme) next = list[Math.floor(Math.random() * list.length)]; }
  else next = list[0];
  state.currentTheme = next;
  renderTheme();
}

// Events
$('randomize').addEventListener('click', randomize);
$('darkToggle').addEventListener('click', () => { state.dark = !state.dark; applyTheme(); });

function setMode(mode) {
  state.mode = mode;
  document.querySelectorAll('.mode-opt').forEach(btn => {
    const on = btn.dataset.mode === mode;
    btn.classList.toggle('active', on);
    btn.setAttribute('aria-selected', on ? 'true' : 'false');
  });
}
document.querySelectorAll('.mode-opt').forEach(btn => btn.addEventListener('click', () => setMode(btn.dataset.mode)));

// Init
applyTheme();
</script>
</body>
</html>
